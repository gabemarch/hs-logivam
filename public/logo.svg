<svg width="600" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="leafGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#1A5E28"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#1A5E28" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ICON: Location pin = Leaf dual meaning -->
  <g filter="url(#shadow)">
    <path d="M 82,20
             C 108,20 130,42 130,68
             C 130,94 110,114 90,129
             L 82,158
             L 74,129
             C 54,114 34,94 34,68
             C 34,42 56,20 82,20 Z"
          fill="url(#leafGrad)"/>
  </g>

  <!-- Inner leaf veins -->
  <path d="M 82,120 C 80,98 78,80 82,52"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M 81,90 C 70,83 60,80 52,81"
        stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M 81,74 C 71,67 63,64 56,63"
        stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- Checkmark (Kontrolling) -->
  <polyline points="64,68 76,80 102,51"
            stroke="white" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>

  <!-- "HS LogiVám" -->
  <text x="158" y="79"
        font-weight="900"
        font-size="43"
        fill="#1A5E28"
        letter-spacing="-0.5">HS LogiVám</text>

  <!-- Accent line -->
  <rect x="158" y="90" width="420" height="2.5" fill="#4CAF50" rx="1.25"/>

  <!-- "ZÖLD KONTROLLING" -->
  <text x="160" y="120"
        font-weight="400"
        font-size="20"
        fill="#2E7D32"
        letter-spacing="4">ZÖLD KONTROLLING</text>

  <!-- Tagline -->
  <text x="161" y="148"
        font-size="12.5"
        fill="#7A9A7A"
        letter-spacing="0.4">Logisztika  ·  Vámjog  ·  Fenntartható Megfelelés</text>
</svg>
